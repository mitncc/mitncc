<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Tarang — Digital Magazine</title>
  <link rel="icon" type="image/png" href="ncclogo.png"/>
  <link rel="apple-touch-icon" href="ncclogo.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="tb-left">
      <img src="ncclogo.png" class="tb-logo" alt="NCC"/>
      <span class="tb-title">Tarang</span>
    </div>
    <div class="tb-center" id="page-label">
      <span id="cur-page">1</span><span class="tb-sep">/</span><span id="tot-page">85</span>
    </div>
    <div class="tb-right">
      <button id="btn-prev" class="nb" title="Previous">&#8592;</button>
      <button id="btn-next" class="nb" title="Next">&#8594;</button>
    </div>
    <div id="prog"></div>
  </header>

  <!-- BOOK CONTAINER -->
  <div id="viewer">
    <div id="book">

      <!-- Static background pages (what you see behind the flip) -->
      <div id="left-page"  class="static-page"><img id="left-img"  alt="" draggable="false"/></div>
      <div id="right-page" class="static-page"><img id="right-img" alt="" draggable="false"/></div>

      <!-- The folding half that animates -->
      <div id="flipper">
        <div class="flip-face flip-front"><img id="flip-front-img" alt="" draggable="false"/></div>
        <div class="flip-face flip-back" ><img id="flip-back-img"  alt="" draggable="false"/></div>
      </div>

      <!-- Spine shadow -->
      <div id="spine"></div>

    </div>

    <!-- Clickable nav arrows -->
    <button id="arr-prev" class="arr" title="Previous page">&#10094;</button>
    <button id="arr-next" class="arr" title="Next page">&#10095;</button>
  </div>

  <audio id="snd" src="pageturn.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
