<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tarang — Digital Magazine</title>

  <!-- NCC Logo favicon -->
  <link rel="icon" type="image/png" href="ncclogo.png" />
  <link rel="apple-touch-icon" href="ncclogo.png" />

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ════════════════════════════════
       DESKTOP: sticky topbar
  ════════════════════════════════ -->
  <header id="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <span class="brand-title">Tarang</span>
        <span class="brand-divider">—</span>
        <span class="brand-sub">Digital Edition</span>
      </div>
      <div class="topbar-center">
        <span id="page-label">Page <span id="current-page">1</span> / <span id="total-pages">85</span></span>
      </div>
      <div class="topbar-right">
        <button id="btn-prev" class="nav-btn" title="Previous (←)">&#8592;</button>
        <button id="btn-next" class="nav-btn" title="Next (→)">&#8594;</button>
      </div>
    </div>
    <div id="progress-bar"></div>
  </header>

  <!-- ════════════════════════════════
       MOBILE: fullscreen page viewer
  ════════════════════════════════ -->
  <div id="mobile-viewer">

    <!-- Floating page counter pill -->
    <div id="mobile-counter">
      <span id="m-current">1</span><span class="m-sep">/</span><span id="m-total">85</span>
    </div>

    <!-- Single page image stage -->
    <div id="mobile-stage">
      <img id="mobile-img" src="" alt="Magazine page" draggable="false" />

      <!-- Slide-in overlay hint on first open -->
      <div id="swipe-hint">&#8592;&nbsp;&nbsp;swipe to turn&nbsp;&nbsp;&#8594;</div>
    </div>

    <!-- Invisible tap zones for tap-navigation -->
    <div id="tap-prev" class="tap-zone"></div>
    <div id="tap-next" class="tap-zone"></div>

  </div>

  <!-- ════════════════════════════════
       DESKTOP: scrollable magazine
  ════════════════════════════════ -->
  <main id="magazine">
    <!-- Injected by script.js -->
  </main>

  <footer id="footer">Tarang &mdash; All rights reserved</footer>

  <!-- Page-turn sound: place pageturn.mp3 in repo root -->
  <audio id="page-turn-sound" src="pageturn.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
